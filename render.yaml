services:
  # Backend API Service (Python)
  - type: web
    name: defi-risk-auditor-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENGRADIENT_PRIVATE_KEY
        sync: false
      - key: OPENGRADIENT_SETTLEMENT_MODE
        value: BATCH_HASHED
      - key: OPENGRADIENT_MODEL
        value: GPT_5
      - key: REDIS_URL
        value: "redis://localhost:6379"  # Use localhost for now, can be updated to actual Redis service later
      - key: CACHE_TTL
        value: "300"
      - key: RATE_LIMIT_REQUESTS
        value: "100"
      - key: RATE_LIMIT_PERIOD
        value: "3600"
      - key: DEBUG
        value: "False"
      - key: CORS_ORIGINS
        value: '["https://*.onrender.com", "http://localhost:3000"]'
    healthCheckPath: /api/health
    autoDeploy: true

  # Frontend Web Service (Node.js - Next.js)
  - type: web
    name: defi-risk-auditor-frontend
    runtime: node
    region: oregon
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    startCommand: cd frontend && npm start
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://defi-risk-auditor-backend.onrender.com
      - key: NEXT_PUBLIC_APP_NAME
        value: DeFi Risk Auditor
      - key: NEXT_PUBLIC_APP_DESCRIPTION
        value: TEE-verified DeFi protocol risk analysis with on-chain proof
      - key: NODE_ENV
        value: production
    autoDeploy: true

  # Redis Cache Service
  - type: redis
    name: redis
    region: oregon
    plan: free
    ipAllowList:
      - source: 0.0.0.0/0
        description: everywhere